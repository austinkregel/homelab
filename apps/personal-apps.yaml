    container_name: vito.web
    entrypoint: "bash /var/www/html/start.sh"
    image: ghcr.io/austinkregel/vito:latest
    user: "root:root"
    healthcheck:
      test:
      - CMD
      - curl
      - vito.web:8000/login
      retries: 3
      timeout: 5s
      interval: 15s
    env_file:
      - ../.env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
  vito.client:
    profiles: ["all", "personal"]
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ../appdata/vito_client:/home/vito
    networks:
      internal:
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    container_name: vito.client
    build:
        context: ./vito-client
        dockerfile: Dockerfile
    ports:
      - "22222:22"
    user: "root:root"
    env_file:
      - ../.env
