    command: bash /var/www/html/start.sh
    depends_on:
        homelab-mariadb:
            condition: service_healthy
            restart: true
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    env_file:
      - ../.env

  spork.web:
