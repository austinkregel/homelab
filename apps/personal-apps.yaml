include: 
 - ./mariadb.yaml
 - ./redis.yaml
 - ./meilisearch.yaml

services:
  aut.hair.web:
    profiles: ["all", "personal", "core"]
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ../appdata/aut.hair/.env:/var/www/html/.env
      - ../appdata/aut.hair/services.php:/var/www/html/config/services.php
      - ../appdata/aut.hair/storage:/var/www/html/storage
    networks:
      internal:
    container_name: aut.hair.web
    image: ghcr.io/austinkregel/aut.hair:latest
    user: "root:root"
    healthcheck:
      test:
      - CMD
      - curl
      - aut.hair.web:8000/up
      retries: 3
      timeout: 5s
      interval: 15s
    depends_on:
        homelab-mariadb:
            condition: service_healthy
            restart: true
        homelab-redis:
            condition: service_healthy
            restart: true
    env_file:
      - ../appdata/aut.hair/.env

  spork.queue:
    profiles: ["all", "personal"]
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ../appdata/spork/.env:/var/www/html/.env
      - ${DOCKER_DIRECTORY}/php-template-queue.sh:/var/www/html/start.sh
      - ../appdata/spork/queue.log:/var/www/html/storage/logs/laravel.log
    networks:
      internal:
    container_name: spork.queue
    image: ghcr.io/austinkregel/spork:latest
    command: bash /var/www/html/start.sh
    depends_on:
        homelab-mariadb:
            condition: service_healthy
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    env_file:
      - ../.env

  spork.cron:
    profiles: ["all", "personal"]
    extra_hosts:
      - host.docker.internal:host-gateway
