  laradar.web:
    profiles: ["all", "personal"]
    volumes:
      - ../appdata/laradarr/.env:/var/www/html/.env
      - ../appdata/laradarr/logs:/var/www/html/storage/logs/
      - ../appdata/laradarr/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    networks:
      internal:
    container_name: laradar.web
    image: ghcr.io/austinkregel/laradarr:latest
    depends_on:
        homelab-postgres:
            condition: service_healthy
            restart: true
    extra_hosts:
      - host.docker.internal:host-gateway
      - aut.hair:host-gateway
      - sonarr.kregel.host:host-gateway
      - radarr.kregel.host:host-gateway
      - readarr.kregel.host:host-gateway
      - lidarr.kregel.host:host-gateway
