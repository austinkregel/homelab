include: 
  - ./redis.yaml
  - ./postgres.yaml
  # - ./sentry.yaml
services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    restart: no
    hostname: 'gitlab.kregel.host'
    ports:
      - '2222:22'
    volumes:
      - '../appdata/gitlab/config:/etc/gitlab'
      - '../appdata/gitlab/logs:/var/log/gitlab'
      - '../appdata/gitlab/data:/var/opt/gitlab'
      - '../appdata/proton-bridge/:/etc/gitlab/trusted-certs'
    shm_size: '256m'
    environment:
      - GITLAB_LOG_LEVEL=error
    networks:
      internal:
    depends_on:
      homelab-postgres:
        condition: service_healthy
        restart: true
      homelab-redis:
        condition: service_healthy
        restart: true      
    healthcheck:
      test: curl --fail http://gitlab:8181/ || exit 1
      interval: 40s
      timeout: 30s
      retries: 3
      start_period: 60s
    logging:
      driver: none
  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    container_name: gitlab-runner
    restart: always
    environment:
      - DOCKER_HOST=tcp://socket-proxy:2375
    ports:
      - '2224:22'
    volumes:
      - '../appdata/gitlab-runner/config:/etc/gitlab-runner:z'
      - '../appdata/gitlab-runner/certs:/certs:ro'
    shm_size: '256m'
    networks:
      internal:
    depends_on:
      gitlab:
        condition: service_healthy
        restart: true
    logging:
        driver: none

  perforce:
    image: ambakshi/perforce-server
    hostname: perforce
    volumes:
      - ../appdata/perforce-data:/data
    ports:
      - "1666:1666"
    env_file:
      - '../perforce-env'
    networks:
      internal:
    restart: always
    healthcheck:
      test: ["CMD", "p4", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3