    container_name: prowlarr
    restart: unless-stopped
    volumes:
      - ${DOCKER_DIRECTORY}/appdata/prowlarr:/config
    environment:
      - PUID=${PUID:?err}
      - PGID=${PGID:?err}
      - TZ=${TIMEZONE:?err}
      - DOCKER_MODS=ghcr.io/gilbn/theme.park:prowlarr
      - TP_THEME=${TP_THEME:?err}
    network_mode: "service:gluetun"
    logging:
      driver: none

  qbittorrent:
